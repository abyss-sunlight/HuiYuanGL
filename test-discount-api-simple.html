<!DOCTYPE html>
<html>
<head>
    <title>充值折扣API测试</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>充值折扣API测试</h1>
    
    <div class="test-section">
        <h2>测试步骤：</h2>
        <ol>
            <li>确保后端服务运行在 <strong>http://localhost:8080</strong></li>
            <li>确保数据库已执行 <strong>40_recharge_discount.sql</strong></li>
            <li>点击下面的按钮测试API</li>
        </ol>
    </div>
    
    <div class="test-section">
        <h2>API测试</h2>
        <button onclick="testGetAllDiscounts()">测试获取所有折扣</button>
        <div id="result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>数据库检查</h2>
        <button onclick="checkDatabase()">检查数据库连接</button>
        <div id="dbResult" class="result"></div>
    </div>

    <script>
        async function testGetAllDiscounts() {
            try {
                const response = await fetch('http://localhost:8080/api/recharge-discount');
                const data = await response.json();
                
                document.getElementById('result').innerHTML = 
                    '<h3>获取所有折扣 - 结果:</h3>' +
                    '<pre>' + JSON.stringify(data, null, 2) + '</pre>' +
                    (data.code === 0 ? '<p class="success">✅ API调用成功</p>' : '<p class="error">❌ API调用失败</p>');
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    '<h3>获取所有折扣 - 错误:</h3>' +
                    '<p class="error">' + error.message + '</p>';
            }
        }
        
        async function checkDatabase() {
            try {
                const response = await fetch('http://localhost:8080/api/recharge-discount');
                const data = await response.json();
                
                if (data.code === 0 && data.data) {
                    document.getElementById('dbResult').innerHTML = 
                        '<h3>数据库检查 - 结果:</h3>' +
                        '<p class="success">✅ 数据库连接正常</p>' +
                        '<p>数据条数: ' + data.data.length + '</p>' +
                        '<p>第一条数据: ' + (data.data.length > 0 ? JSON.stringify(data.data[0]) : '无') + '</p>';
                } else {
                    document.getElementById('dbResult').innerHTML = 
                        '<h3>数据库检查 - 结果:</h3>' +
                        '<p class="error">❌ 数据库可能没有数据</p>' +
                        '<p>请确保已执行 40_recharge_discount.sql</p>';
                }
            } catch (error) {
                document.getElementById('dbResult').innerHTML = 
                    '<h3>数据库检查 - 错误:</h3>' +
                    '<p class="error">' + error.message + '</p>' +
                    '<p>请检查后端服务是否启动</p>';
            }
        }
    </script>
</body>
</html>
